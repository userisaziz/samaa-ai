# cloudbuild-api.yaml — Build and deploy samaa-api (FastAPI)
steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args: ['-c', 'gcloud auth configure-docker us-central1-docker.pkg.dev --quiet']
    id: 'auth-docker'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        mkdir -p apps/api
        printf '%s\n' "$$API_ENV_PROD" > apps/api/.env.prod

        awk -F= '{
          i = index($$0, "=")
          if (i == 0) next
          key = substr($$0, 1, i-1)
          val = substr($$0, i+1)
          gsub(/"/, "\\\"", val)
          print key ": \"" val "\""
        }' <(grep -v '^[[:space:]]*$$' apps/api/.env.prod | grep -v '^#') > apps/api/.env.prod.yaml
    secretEnv: [API_ENV_PROD]
    waitFor: ['auth-docker']
    id: 'write-env'

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG} \
          -f Dockerfile . && \
        docker push us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}
    dir: 'apps/api'
    waitFor: ['write-env']
    id: 'build-push'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'samaa-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8000'
      - '--cpu=1'
      - '--memory=1Gi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=50'
      - '--timeout=300'
      - '--env-vars-file=apps/api/.env.prod.yaml'
    waitFor: ['build-push']
    id: 'deploy'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'samaa-migrations'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}'
      - '--region=${_REGION}'
      - '--args=alembic,upgrade,head'
      - '--env-vars-file=apps/api/.env.prod.yaml'
    waitFor: ['deploy']
    id: 'migrate-db'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/api-env-prod/versions/latest
      env: API_ENV_PROD

substitutions:
  _TAG: 'latest'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
