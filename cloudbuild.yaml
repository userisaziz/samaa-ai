# Cloud Build config for CXSAMAA — 2 services: API + Dashboard
# The AI pipeline runs locally; Cloud Run is a thin upload + dashboard layer.
# Landing page temporarily disabled due to build issues.
steps:
  # Configure Docker for Artifact Registry
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
    id: 'auth-docker'

  # Build and Push API image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG} \
          -f Dockerfile \
          . && \
        docker push us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}
    dir: 'apps/api'
    waitFor: ['auth-docker']
    id: 'build-push-api'

  # Build and Push Frontend image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-web:${_TAG} \
          -f apps/web/Dockerfile \
          . && \
        docker push us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-web:${_TAG}
    waitFor: ['auth-docker']
    id: 'build-push-web'

  # Build and Push Landing Page image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-landing:${_TAG} \
          -f apps/landing/Dockerfile \
          . && \
        docker push us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-landing:${_TAG}
    waitFor: ['auth-docker']
    id: 'build-push-landing'

  # Write .env.prod files from Secret Manager (files are gitignored, so we create them at build time)
  # Convert KEY=VALUE format to YAML (key: "value") for gcloud run deploy --env-vars-file
  # Override API_BASE_URL with actual Cloud Run API URL for production rewrites
  # Override NEXT_PUBLIC_API_URL with custom domain for direct API calls
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p apps/api apps/web && \
        printf '%s\n' "$$API_ENV_PROD" | sed 's/=/: "/' | sed 's/$/"/' | sed '/^"$$/d' > apps/api/.env.prod && \
        printf '%s\n' "$$WEB_ENV_PROD" | sed 's/=/: "/' | sed 's/$/"/' | sed '/^"$$/d' > apps/web/.env.prod && \
        API_URL=$$(gcloud run services describe samaa-api --region=${_REGION} --format="value(status.url)") && \
        echo "API_URL detected: $${API_URL}" && \
        if grep -q "API_BASE_URL" apps/web/.env.prod; then \
          sed -i "s|API_BASE_URL:.*|API_BASE_URL: \"$${API_URL}\"|g" apps/web/.env.prod; \
          echo "Updated existing API_BASE_URL"; \
        else \
          echo "API_BASE_URL: \"$${API_URL}\"" >> apps/web/.env.prod; \
          echo "Added new API_BASE_URL"; \
        fi && \
        if grep -q "NEXT_PUBLIC_API_URL" apps/web/.env.prod; then \
          sed -i "s|NEXT_PUBLIC_API_URL:.*|NEXT_PUBLIC_API_URL: \"https://api.cxsamaa.store/api/v1\"|g" apps/web/.env.prod; \
          echo "Updated NEXT_PUBLIC_API_URL"; \
        else \
          echo "NEXT_PUBLIC_API_URL: \"https://api.cxsamaa.store/api/v1\"" >> apps/web/.env.prod; \
          echo "Added NEXT_PUBLIC_API_URL for direct API calls"; \
        fi && \
        echo "Final web .env.prod contents:" && cat apps/web/.env.prod
    secretEnv: ['API_ENV_PROD', 'WEB_ENV_PROD']
    waitFor: ['build-push-api', 'build-push-web']
    id: 'write-env-files'

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'samaa-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8000'
      - '--cpu=1'
      - '--memory=1Gi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=50'
      - '--timeout=300'
      - '--env-vars-file=apps/api/.env.prod'
      # Note: --allow-unauthenticated removed due to org policy iam.allowedPolicyMemberDomains
      # Services are domain-restricted to marsatijarah.com. Access via custom domains or IAM.
    waitFor: ['write-env-files']
    id: 'deploy-api'

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'samaa-web'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-web:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=3000'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=80'
      - '--timeout=60'
      - '--env-vars-file=apps/web/.env.prod'
      # Note: --allow-unauthenticated removed due to org policy iam.allowedPolicyMemberDomains
      # Services are domain-restricted to marsatijarah.com. Access via custom domains or IAM.
    waitFor: ['write-env-files']
    id: 'deploy-web'

  # Deploy Landing Page to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'samaa-landing'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-landing:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--cpu=1'
      - '--memory=256Mi'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--concurrency=100'
      - '--timeout=30'
      # Static site — no env vars needed
      # Note: --allow-unauthenticated removed due to org policy iam.allowedPolicyMemberDomains
      # Services are domain-restricted to marsatijarah.com. Access via custom domains or IAM.
    waitFor: ['build-push-landing']
    id: 'deploy-landing'

  # Run database migrations
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'samaa-migrations'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}'
      - '--region=${_REGION}'
      - '--args=alembic,upgrade,head'
      - '--env-vars-file=apps/api/.env.prod'
    waitFor: ['deploy-api']
    id: 'migrate-db'

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/api-env-prod/versions/latest
    env: API_ENV_PROD
  - versionName: projects/$PROJECT_ID/secrets/web-env-prod/versions/latest
    env: WEB_ENV_PROD

substitutions:
  _TAG: 'latest'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
