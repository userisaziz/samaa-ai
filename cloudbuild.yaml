# Cloud Build config for CXSAMAA — 3 services: API + Dashboard + Landing
# The AI pipeline runs locally; Cloud Run is a thin upload + dashboard + marketing layer.
steps:
  # Configure Docker for Artifact Registry
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['auth', 'configure-docker', 'us-central1-docker.pkg.dev', '--quiet']
    id: 'auth-docker'

  # Build API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}', '-f', 'Dockerfile', '.']
    dir: 'apps/api'
    waitFor: ['auth-docker']
    id: 'build-api'

  # Build Frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-web:${_TAG}', '-f', 'apps/web/Dockerfile', '.']
    waitFor: ['auth-docker']
    id: 'build-web'

  # Build Landing page image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-landing:${_TAG}', '-f', 'apps/landing/Dockerfile', '.']
    waitFor: ['auth-docker']
    id: 'build-landing'

  # Push API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}']
    waitFor: ['build-api']
    id: 'push-api'

  # Push Frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-web:${_TAG}']
    waitFor: ['build-web']
    id: 'push-web'

  # Push Landing image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-landing:${_TAG}']
    waitFor: ['build-landing']
    id: 'push-landing'

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'samaa-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8000'
      - '--cpu=1'
      - '--memory=1Gi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=50'
      - '--timeout=300'
      - '--set-env-vars=APP_ENV=production,APP_DEBUG=false,PIPELINE_MODE=cloud-only'
      - '--env-vars-file=apps/api/.env.prod'
      - '--allow-unauthenticated'
    waitFor: ['push-api']
    id: 'deploy-api'

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'samaa-web'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-web:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=3000'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=80'
      - '--timeout=60'
      - '--set-env-vars=NEXT_PUBLIC_API_URL=/api/v1'
      - '--env-vars-file=apps/web/.env.prod'
      - '--allow-unauthenticated'
    waitFor: ['push-web', 'deploy-api']
    id: 'deploy-web'

  # Deploy Landing page to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'samaa-landing'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-landing:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--cpu=1'
      - '--memory=256Mi'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--concurrency=100'
      - '--timeout=30'
      - '--allow-unauthenticated'
    waitFor: ['push-landing']
    id: 'deploy-landing'

  # Run database migrations
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'samaa-migrations'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-api:${_TAG}'
      - '--region=${_REGION}'
      - '--args=alembic,upgrade,head'
      - '--set-env-vars=APP_ENV=production'
      - '--env-vars-file=apps/api/.env.prod'
    waitFor: ['deploy-api']
    id: 'migrate-db'

substitutions:
  _TAG: 'latest'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
