# cloudbuild-web.yaml — Build and deploy samaa-web (Next.js)
steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'sh'
    args: ['-c', 'gcloud auth configure-docker us-central1-docker.pkg.dev --quiet']
    id: 'auth-docker'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        mkdir -p apps/web
        printf '%s\n' "$$WEB_ENV_PROD" > apps/web/.env.prod

        if grep -q "^NEXT_PUBLIC_API_URL=" apps/web/.env.prod; then
          sed -i 's|^NEXT_PUBLIC_API_URL=.*|NEXT_PUBLIC_API_URL=https://api.cxsamaa.store/api/v1|g' apps/web/.env.prod
        else
          echo "NEXT_PUBLIC_API_URL=https://api.cxsamaa.store/api/v1" >> apps/web/.env.prod
        fi

        awk -F= '{
          i = index($$0, "=")
          if (i == 0) next
          key = substr($$0, 1, i-1)
          val = substr($$0, i+1)
          gsub(/"/, "\\\"", val)
          print key ": \"" val "\""
        }' <(grep -v '^[[:space:]]*$$' apps/web/.env.prod | grep -v '^#') > apps/web/.env.prod.yaml
    secretEnv: [WEB_ENV_PROD]
    waitFor: ['auth-docker']
    id: 'write-env'

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-web:${_TAG} \
          -f apps/web/Dockerfile \
          --build-arg NEXT_PUBLIC_API_URL=https://api.cxsamaa.store/api/v1 \
          . && \
        docker push us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-web:${_TAG}
    waitFor: ['write-env']
    id: 'build-push'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'samaa-web'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/samaa-registry/samaa-web:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=3000'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=80'
      - '--timeout=60'
      - '--env-vars-file=apps/web/.env.prod.yaml'
    waitFor: ['build-push']
    id: 'deploy'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/web-env-prod/versions/latest
      env: WEB_ENV_PROD

substitutions:
  _TAG: 'latest'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
