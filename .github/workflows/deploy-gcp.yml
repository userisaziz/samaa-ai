# deploy-gcp.yml — Selective deploy to GCP Cloud Run
#
# Only rebuilds and redeploys services whose code actually changed.
# Auth: Workload Identity Federation (no service account keys).
name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: gcp-deploy
  cancel-in-progress: false

env:
  REGION: us-central1

jobs:
  # ── Detect which apps changed ────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web || steps.filter.outputs.shared }}
      landing: ${{ steps.filter.outputs.landing || steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            landing:
              - 'apps/landing/**'
            shared:
              - 'packages/shared/**'
            config:
              - 'cloudbuild-*.yaml'
              - '.github/workflows/deploy-gcp.yml'

  # ── Deploy changed services ──────────────────────────────────────
  deploy:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CLOUD_RUN_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - run: gcloud auth configure-docker --quiet

      # ── API ──────────────────────────────────────────────────────
      - name: Deploy API
        if: needs.changes.outputs.api == 'true'
        run: |
          gcloud builds submit \
            --config=cloudbuild-api.yaml \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --substitutions=_TAG=${{ github.sha }} \
            --timeout=1200

      # ── Web ──────────────────────────────────────────────────────
      - name: Deploy Web
        if: needs.changes.outputs.web == 'true'
        run: |
          gcloud builds submit \
            --config=cloudbuild-web.yaml \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --substitutions=_TAG=${{ github.sha }} \
            --timeout=1200

      # ── Landing ──────────────────────────────────────────────────
      - name: Deploy Landing
        if: needs.changes.outputs.landing == 'true'
        run: |
          gcloud builds submit \
            --config=cloudbuild-landing.yaml \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --substitutions=_TAG=${{ github.sha }} \
            --timeout=900

  # ── Health checks ────────────────────────────────────────────────
  health-check:
    needs: [changes, deploy]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: samaa-api
            deploy: ${{ needs.changes.outputs.api }}
          - service: samaa-web
            deploy: ${{ needs.changes.outputs.web }}
          - service: samaa-landing
            deploy: ${{ needs.changes.outputs.landing }}
    steps:
      - uses: google-github-actions/auth@v2
        if: matrix.deploy == 'true'
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CLOUD_RUN_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        if: matrix.deploy == 'true'
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Check readiness — ${{ matrix.service }}
        if: matrix.deploy == 'true'
        run: |
          for i in 1 2 3 4 5; do
            READY=$(gcloud run services describe ${{ matrix.service }} \
              --region=${{ env.REGION }} \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --format='value(status.latestReadyRevisionName)')
            if [ -n "${READY}" ]; then
              echo "${{ matrix.service }}: READY (${READY})"
              exit 0
            fi
            echo "Attempt ${i}/5: not ready, waiting 15s..."
            sleep 15
          done
          echo "::warning::${{ matrix.service }} did not become ready after 75s"

  # ── Summary ──────────────────────────────────────────────────────
  summary:
    needs: [changes, deploy, health-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "════════════════════════════════════════"
          echo "  Deploy Summary"
          echo "════════════════════════════════════════"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Author:  ${{ github.actor }}"
          echo "  API:     ${{ needs.changes.outputs.api == 'true' && 'deployed' || 'skipped' }}"
          echo "  Web:     ${{ needs.changes.outputs.web == 'true' && 'deployed' || 'skipped' }}"
          echo "  Landing: ${{ needs.changes.outputs.landing == 'true' && 'deployed' || 'skipped' }}"
          echo "  Status:  ${{ needs.deploy.result }}"
          echo "════════════════════════════════════════"
