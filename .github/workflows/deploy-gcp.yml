# deploy-gcp.yml — Deploy 2 services to GCP Cloud Run
#
# Triggers: push to main
# Auth:     Workload Identity Federation (no keys!)
# Build:    Cloud Build via cloudbuild.yaml
# Services: samaa-api (FastAPI) + samaa-web (Next.js)
name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'apps/landing/**'
      - 'packages/shared/**'
      - 'cloudbuild.yaml'
      - '.github/workflows/deploy-gcp.yml'

# Required for Workload Identity Federation
permissions:
  id-token: write
  contents: read

concurrency:
  group: gcp-deploy
  cancel-in-progress: false

env:
  REGION: us-central1

jobs:
  # ── Pre-flight ───────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-flight checks
        run: |
          echo "=== Pre-flight ==="
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Author:  ${{ github.actor }}"
          for f in apps/api/pyproject.toml apps/web/package.json apps/landing/package.json cloudbuild.yaml; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
          done
          echo "  All required files present"

  # ── Deploy ────────────────────────────────────────────────────────
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP ──────────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ── Submit to Cloud Build ────────────────────────────────────
      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --substitutions=_TAG=${{ github.sha }} \
            --timeout=1800

      # ── Health checks (service readiness, not HTTP) ──────────────
      # Services are domain-restricted, so HTTP checks fail from GitHub Actions
      # Instead we verify the service is in READY state
      - name: Health check — API readiness
        run: |
          API_URL=$(gcloud run services describe samaa-api \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "  API URL: ${API_URL}"

          # Retry readiness check (service may still be rolling out)
          for i in 1 2 3 4 5; do
            READY=$(gcloud run services describe samaa-api \
              --region=${{ env.REGION }} \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --format='value(status.latestReadyRevisionName)')
            
            if [ -n "${READY}" ]; then
              echo "  API status: READY (revision: ${READY})"
              exit 0
            fi
            echo "  Attempt ${i}/5: not ready yet, waiting 15s..."
            sleep 15
          done
          
          echo "::error::API did not become ready after 75s"
          exit 1

      - name: Health check — Web readiness
        run: |
          WEB_URL=$(gcloud run services describe samaa-web \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "  Web URL: ${WEB_URL}"

          # Retry readiness check
          for i in 1 2 3 4 5; do
            READY=$(gcloud run services describe samaa-web \
              --region=${{ env.REGION }} \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --format='value(status.latestReadyRevisionName)')
            
            if [ -n "${READY}" ]; then
              echo "  Web status: READY (revision: ${READY})"
              exit 0
            fi
            echo "  Attempt ${i}/5: not ready yet, waiting 15s..."
            sleep 15
          done
          
          echo "::warning::Web did not become ready after 75s"

      - name: Health check — Landing readiness
        run: |
          LANDING_URL=$(gcloud run services describe samaa-landing \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "  Landing URL: ${LANDING_URL}"

          # Retry readiness check
          for i in 1 2 3 4 5; do
            READY=$(gcloud run services describe samaa-landing \
              --region=${{ env.REGION }} \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --format='value(status.latestReadyRevisionName)')
            
            if [ -n "${READY}" ]; then
              echo "  Landing status: READY (revision: ${READY})"
              exit 0
            fi
            echo "  Attempt ${i}/5: not ready yet, waiting 15s..."
            sleep 15
          done
          
          echo "::warning::Landing did not become ready after 75s"

      # ── Summary ──────────────────────────────────────────────────
      - name: Deploy summary
        if: always()
        run: |
          echo "════════════════════════════════════════"
          if [ "${{ job.status }}" = "success" ]; then
            echo "  Deployment Successful"
            echo "════════════════════════════════════════"
            echo ""
            echo "  Commit:  ${{ github.sha }}"
            echo "  Author:  ${{ github.actor }}"
          else
            echo "  Deployment Failed"
            echo "════════════════════════════════════════"
            echo "  Commit: ${{ github.sha }}"
          fi
