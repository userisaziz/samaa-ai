name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

# Prevent concurrent deployments
concurrency:
  group: production
  cancel-in-progress: false

env:
  APP_DIR: /home/ubuntu/samaa-ai
  DEPLOY_TIMEOUT: 600

jobs:
  # ── Pre-flight validation ──────────────────────────────────────
  validate:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          echo "=== Pre-flight Checks ==="
          echo "  Branch:    ${{ github.ref_name }}"
          echo "  Commit:    ${{ github.sha }}"
          echo "  Author:    ${{ github.actor }}"

          for f in apps/api/pyproject.toml apps/web/package.json .env.example; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "  All required files present"

  # ── Deploy ─────────────────────────────────────────────────────
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          echo "  Scanning host key on port ${SSH_PORT}..."
          for i in 1 2 3 4 5; do
            if ssh-keyscan -T 10 -p "$SSH_PORT" -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>&1; then
              echo "  Host key acquired on attempt $i"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "::error::ssh-keyscan failed after 5 attempts. Is the VM reachable on port ${SSH_PORT}?"
              echo "  Verify: Oracle VM is running, SSH port is open, and ingress rule allows GitHub IPs"
              exit 1
            fi
            echo "  Attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Set SSH options
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          echo "SSH_OPTS=-p ${SSH_PORT} \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=5 \
            -o ConnectTimeout=15 \
            -o TCPKeepAlive=yes \
            -o LogLevel=ERROR" >> "$GITHUB_ENV"

      # ── Step 1: Pre-flight + swap setup ──
      - name: "1/6 · Server pre-flight & swap setup"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail

          echo "=== Server Pre-flight (1GB VM) ==="

          # Disk space
          AVAIL_KB=$(df /home | awk 'NR==2 {print $4}')
          AVAIL_MB=$((AVAIL_KB / 1024))
          echo "  Disk:    ${AVAIL_MB}MB available"

          # Memory
          MEM_TOTAL=$(free -m | awk '/^Mem:/{print $2}')
          MEM_FREE=$(free -m | awk '/^Mem:/{print $7}')
          echo "  Memory:  ${MEM_FREE}MB free / ${MEM_TOTAL}MB total"

          # Setup 2GB swap if not present (critical for 1GB VM)
          if [ "$(swapon --show | wc -l)" -eq 0 ]; then
            echo "  Creating 2GB swap..."
            sudo fallocate -l 2G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo "/swapfile none swap sw 0 0" | sudo tee -a /etc/fstab
            echo 10 | sudo tee /proc/sys/vm/swappiness
            echo "  ✓ Swap enabled"
          else
            echo "  Swap:    already active"
          fi

          echo "=== Pre-flight passed ==="
          REMOTE

      # ── Step 2: Pull latest code ──
      - name: "2/6 · Pull latest code"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/samaa-ai

          PREV_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "none")
          echo "  Previous: $(git log --oneline -1 2>/dev/null || echo 'first deploy')"

          git stash --include-untracked --quiet 2>/dev/null || true
          git pull --ff-only origin main || git pull origin main

          NEW_COMMIT=$(git rev-parse HEAD)
          echo "  Current:  $(git log --oneline -1)"

          if [ "$PREV_COMMIT" = "$NEW_COMMIT" ]; then
            echo "  Already up-to-date"
          else
            echo "  Updated: $PREV_COMMIT -> $NEW_COMMIT"
          fi
          REMOTE

      # ── Step 3: Backend dependencies ──
      - name: "3/6 · Install backend dependencies"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/samaa-ai/apps/api

          echo "  Python: $(python3 --version 2>/dev/null || echo 'not found')"

          if ! command -v uv &> /dev/null; then
            echo "  Installing uv..."
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
          fi

          if [ ! -f ".venv/bin/python" ]; then
            echo "  Creating virtual environment..."
            uv venv
          fi

          source .venv/bin/activate
          echo "  Installing dependencies..."
          uv pip install -e '.[prod]' --quiet 2>/dev/null || uv pip install -e . --quiet
          echo "  Dependencies installed"
          REMOTE

      # ── Step 4: Frontend build ──
      - name: "4/6 · Build frontend (standalone)"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/samaa-ai/apps/web

          echo "  Node: $(node --version)"
          echo "  npm:  $(npm --version)"

          npm ci --prefer-offline --no-audit --quiet 2>/dev/null || npm install --quiet
          npm run build

          # Copy static + public into standalone output
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/* .next/standalone/.next/static/
          if [ -d "public" ]; then
            mkdir -p .next/standalone/public
            cp -r public/* .next/standalone/public/
          fi

          echo "  Frontend built (standalone, ~50MB runtime)"
          REMOTE

      # ── Step 5: Database migrations ──
      - name: "5/6 · Run database migrations"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/samaa-ai/apps/api

          source .venv/bin/activate

          # Load env vars
          set -a
          grep -v '^\s*#' /home/ubuntu/samaa-ai/.env.prod | grep -v '^\s*$' | while IFS='=' read -r key value; do
            export "$key=$value" 2>/dev/null || true
          done
          set +a

          if [[ "${DATABASE_URL:-}" == *"YOUR_"* ]] || [[ -z "${DATABASE_URL:-}" ]]; then
            echo "  ⚠ DATABASE_URL not configured — skipping migrations"
          else
            CURRENT=$(alembic current 2>/dev/null || echo "none")
            echo "  Current revision: $CURRENT"
            alembic upgrade head
            echo "  Migrations applied: $(alembic current 2>/dev/null)"
          fi
          REMOTE

      # ── Step 6: Restart services & health checks ──
      - name: "6/6 · Setup services & restart (1GB optimized)"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail

          # Recreate systemd units to enforce 1GB memory limits
          echo "=== Updating systemd services (1GB budget) ==="

          # FastAPI — 256MB max
          sudo tee /etc/systemd/system/samaa-api.service > /dev/null << 'UNIT'
          [Unit]
          Description=CXSAMAA FastAPI Backend
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/home/ubuntu/samaa-ai/apps/api
          Environment=PATH=/home/ubuntu/samaa-ai/apps/api/.venv/bin
          ExecStart=/home/ubuntu/samaa-ai/apps/api/.venv/bin/uvicorn src.main:app --host 0.0.0.0 --port 8000 --env-file ../../.env.prod --workers 1 --limit-concurrency 10 --limit-max-requests 1000
          Restart=always
          RestartSec=5
          MemoryMax=256M
          MemoryHigh=200M

          [Install]
          WantedBy=multi-user.target
          UNIT

          # Celery — 384MB max (solo pool, no torch loaded)
          sudo tee /etc/systemd/system/samaa-celery.service > /dev/null << 'UNIT'
          [Unit]
          Description=CXSAMAA Celery Worker
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/home/ubuntu/samaa-ai/apps/api
          Environment=PATH=/home/ubuntu/samaa-ai/apps/api/.venv/bin
          ExecStart=/home/ubuntu/samaa-ai/apps/api/.venv/bin/celery -A src.workers.celery_app worker --loglevel=info --pool=solo --concurrency=1 --max-tasks-per-child=10
          EnvironmentFile=/home/ubuntu/samaa-ai/.env.prod
          Restart=always
          RestartSec=5
          MemoryMax=384M
          MemoryHigh=320M

          [Install]
          WantedBy=multi-user.target
          UNIT

          # Next.js — 100MB max (standalone)
          sudo tee /etc/systemd/system/samaa-web.service > /dev/null << 'UNIT'
          [Unit]
          Description=CXSAMAA Next.js Frontend (Standalone)
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/home/ubuntu/samaa-ai/apps/web/.next/standalone
          ExecStart=/usr/bin/node apps/web/server.js
          Environment=NODE_ENV=production
          Environment=PORT=3000
          Environment=HOSTNAME=0.0.0.0
          Restart=always
          RestartSec=5
          MemoryMax=100M
          MemoryHigh=80M

          [Install]
          WantedBy=multi-user.target
          UNIT

          sudo systemctl daemon-reload
          sudo systemctl enable samaa-api samaa-celery samaa-web

          # Restart all services
          echo ""
          echo "=== Restarting Services ==="
          for svc in samaa-api samaa-celery samaa-web; do
            sudo systemctl restart "$svc" 2>/dev/null || true
            echo "  Restarted: $svc"
          done

          # Health checks
          echo ""
          echo "=== Health Checks (waiting 8s) ==="
          sleep 8

          FAILED=0
          for svc in samaa-api samaa-celery samaa-web; do
            if systemctl is-active --quiet "$svc"; then
              echo "  ✅  $svc"
            else
              echo "  ❌  $svc"
              journalctl -u "$svc" -n 20 --no-pager 2>/dev/null | sed 's/^/       /'
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "=== DEPLOYMENT FAILED ==="
            exit 1
          fi

          echo ""
          echo "=== All services healthy ==="
          echo ""
          echo "  Memory budget:"
          echo "    API:     256MB"
          echo "    Celery:  384MB"
          echo "    Web:     100MB"
          echo "    Total:   ~740MB + 2GB swap"
          REMOTE

      # ── Summary ────────────────────────────────────────────────
      - name: Deploy summary
        if: always()
        run: |
          END=$(date +%s)
          START=${DEPLOY_START:-$END}
          DURATION=$((END - START))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))

          echo "════════════════════════════════════════"
          if [ "${{ job.status }}" = "success" ]; then
            echo "  ✅ Deployment Successful"
            echo "════════════════════════════════════════"
            echo ""
            echo "  Duration:  ${MINUTES}m ${SECONDS}s"
            echo "  Commit:    ${{ github.sha }}"
            echo "  Author:    ${{ github.actor }}"
            echo "  App:       http://${{ secrets.SSH_HOST }}"
          else
            echo "  ❌ Deployment Failed"
            echo "════════════════════════════════════════"
            echo ""
            echo "  Duration: ${MINUTES}m ${SECONDS}s"
            echo "  Commit:   ${{ github.sha }}"
            echo ""
            echo "  Debug: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
            echo "         sudo journalctl -u samaa-api -n 100 --no-pager"
          fi

      - name: Rollback on failure
        if: failure() && github.event_name == 'push'
        run: |
          echo "::warning::Deployment failed — previous version may still be running."
          echo ""
          echo "To manually rollback:"
          echo "  ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          echo "  cd /home/ubuntu/samaa-ai"
          echo "  git log --oneline -5"
          echo "  git checkout <good-commit>"
          echo "  sudo systemctl restart samaa-api samaa-celery samaa-web"
