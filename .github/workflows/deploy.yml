name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

# Prevent concurrent deployments
concurrency:
  group: production
  cancel-in-progress: false

env:
  APP_DIR: /home/ubuntu/samaa-ai
  DEPLOY_TIMEOUT: 600  # 10 minutes max for remote commands

jobs:
  # ── Pre-flight validation ──────────────────────────────────────
  validate:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          echo "=== Pre-flight Checks ==="
          echo "  Branch:    ${{ github.ref_name }}"
          echo "  Commit:    ${{ github.sha }}"
          echo "  Author:    ${{ github.actor }}"
          echo "  Workflow:  ${{ github.run_id }}"

          # Ensure critical files exist
          for f in apps/api/pyproject.toml apps/web/package.json .env.example; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "  All required files present"

  # ── Deploy ─────────────────────────────────────────────────────
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Retry ssh-keyscan up to 5 times (transient network issues are common in CI)
          echo "  Scanning host key on port ${{ secrets.SSH_PORT }}..."
          for i in 1 2 3 4 5; do
            if ssh-keyscan -T 10 -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>&1; then
              echo "  Host key acquired on attempt $i"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "::error::ssh-keyscan failed after 5 attempts. Is the VM reachable on port ${{ secrets.SSH_PORT }}?"
              echo "  Verify: Oracle VM is running, SSH port is open, and ingress rule allows GitHub IPs"
              exit 1
            fi
            echo "  Attempt $i failed, retrying in 5s..."
            sleep 5
          done

      # Common SSH options: keep-alive prevents Broken Pipe during long commands
      - name: Set SSH options
        run: |
          echo "SSH_OPTS=-p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=5 \
            -o ConnectTimeout=15 \
            -o TCPKeepAlive=yes \
            -o LogLevel=ERROR" >> "$GITHUB_ENV"

      # ── Step 1: Pre-flight on server ──
      - name: "1/6 · Server pre-flight checks"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail

          echo "=== Server Pre-flight ==="

          # Disk space (fail if < 1GB free)
          AVAIL_KB=$(df /home | awk 'NR==2 {print $4}')
          AVAIL_MB=$((AVAIL_KB / 1024))
          if [ "$AVAIL_MB" -lt 1024 ]; then
            echo "::error::Low disk space: ${AVAIL_MB}MB available (need >1GB)"
            exit 1
          fi
          echo "  Disk:    ${AVAIL_MB}MB available"

          # Memory
          MEM_FREE=$(free -m | awk '/^Mem:/{print $7}')
          echo "  Memory:  ${MEM_FREE}MB free"

          # Services exist
          for svc in samaa-api samaa-celery samaa-web; do
            if ! systemctl list-unit-files "${svc}.service" &>/dev/null; then
              echo "::warning::Service $svc not found on server"
            fi
          done
          echo "  Services: registered"

          echo "=== Pre-flight passed ==="
          REMOTE

      # ── Step 2: Pull latest code ──
      - name: "2/6 · Pull latest code"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/samaa-ai

          PREV_COMMIT=$(git rev-parse HEAD)
          echo "  Previous: $(git log --oneline -1)"

          # Stash local changes (if any) and pull
          git stash --include-untracked --quiet 2>/dev/null || true
          git pull --ff-only origin main

          NEW_COMMIT=$(git rev-parse HEAD)
          echo "  Current:  $(git log --oneline -1)"

          if [ "$PREV_COMMIT" = "$NEW_COMMIT" ]; then
            echo "  Already up-to-date, skipping build steps"
            echo "SKIP_BUILD=true"
          else
            echo "  Updated: $PREV_COMMIT -> $NEW_COMMIT"
            echo "  Changed files:"
            git diff --stat "$PREV_COMMIT" "$NEW_COMMIT"
          fi
          REMOTE

      # ── Step 3: Backend dependencies ──
      - name: "3/6 · Install backend dependencies"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/samaa-ai/apps/api

          echo "  Python: $(python3 --version 2>/dev/null || echo 'not found')"

          # Create venv only if missing or broken
          if [ ! -f ".venv/bin/python" ]; then
            echo "  Creating virtual environment..."
            uv venv
            echo "  venv created"
          else
            echo "  venv exists, reusing"
          fi

          source .venv/bin/activate
          echo "  Installing dependencies..."
          uv pip install -e '.[prod]' --quiet
          echo "  Dependencies installed: $(pip list --format=freeze 2>/dev/null | wc -l) packages"
          REMOTE

      # ── Step 4: Frontend build ──
      - name: "4/6 · Build frontend"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/samaa-ai/apps/web

          echo "  Node: $(node --version)"
          echo "  npm:  $(npm --version)"

          npm ci --prefer-offline --no-audit --quiet 2>/dev/null || npm install --quiet
          npm run build
          echo "  Frontend build complete"
          REMOTE

      # ── Step 5: Database migrations ──
      - name: "5/6 · Run database migrations"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/samaa-ai/apps/api

          source .venv/bin/activate

          # Load env safely (skip comments and empty lines)
          set -a
          grep -v '^\s*#' /home/ubuntu/samaa-ai/.env.prod | grep -v '^\s*$' | while IFS='=' read -r key value; do
            export "$key=$value"
          done
          set +a

          CURRENT=$(alembic current 2>/dev/null || echo "none")
          echo "  Current revision: $CURRENT"

          alembic upgrade head

          echo "  Migrations applied: $(alembic current 2>/dev/null)"
          REMOTE

      # ── Step 6: Restart services & health checks ──
      - name: "6/6 · Restart services and health check"
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'REMOTE'
          set -euo pipefail

          SERVICES=("samaa-api" "samaa-celery" "samaa-web")
          FAILED=0

          echo "=== Restarting Services ==="
          for svc in "${SERVICES[@]}"; do
            sudo systemctl restart "$svc" 2>/dev/null || true
            echo "  Restarted: $svc"
          done

          # Wait for services to stabilize
          echo ""
          echo "=== Health Checks (waiting 8s) ==="
          sleep 8

          for svc in "${SERVICES[@]}"; do
            if systemctl is-active --quiet "$svc"; then
              UPTIME=$(systemctl show "$svc" --property=ActiveEnterTimestamp --value 2>/dev/null || echo "unknown")
              echo "  OK   $svc  (since $UPTIME)"
            else
              echo "  FAIL $svc"
              # Grab last 20 log lines for debugging
              echo "       --- recent logs ---"
              journalctl -u "$svc" -n 20 --no-pager 2>/dev/null | sed 's/^/       /'
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "=== DEPLOYMENT FAILED ==="
            exit 1
          fi

          echo ""
          echo "=== All services healthy ==="
          REMOTE

      # ── Summary ────────────────────────────────────────────────
      - name: Deploy summary
        if: always()
        run: |
          END=$(date +%s)
          START=${DEPLOY_START:-$END}
          DURATION=$((END - START))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))

          echo "════════════════════════════════════════"
          if [ "${{ job.status }}" = "success" ]; then
            echo "  Deployment Successful"
            echo "════════════════════════════════════════"
            echo ""
            echo "  Duration:    ${MINUTES}m ${SECONDS}s"
            echo "  Commit:      ${{ github.sha }}"
            echo "  Author:      ${{ github.actor }}"
            echo "  Application: https://${{ vars.DOMAIN_NAME }}"
            echo "  API Docs:    https://${{ vars.DOMAIN_NAME }}/docs"
            echo "  Health:      https://${{ vars.DOMAIN_NAME }}/health"
          else
            echo "  Deployment Failed"
            echo "════════════════════════════════════════"
            echo ""
            echo "  Duration: ${MINUTES}m ${SECONDS}s"
            echo "  Commit:   ${{ github.sha }}"
            echo ""
            echo "  Debug: ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
            echo "         sudo journalctl -u samaa-api -n 100 --no-pager"
          fi

      # ── Rollback on failure ────────────────────────────────────
      - name: Rollback on failure
        if: failure() && github.event_name == 'push'
        run: |
          echo "::warning::Deployment failed — previous version is still running."
          echo ""
          echo "To manually rollback, SSH into the server:"
          echo "  ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          echo "  cd /home/ubuntu/samaa-ai"
          echo "  git log --oneline -5              # find the last good commit"
          echo "  git checkout <good-commit>"
          echo "  # then re-run build steps and restart services"
