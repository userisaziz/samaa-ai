# ============================================
# CXSAMAA Local Development Infrastructure
# ============================================
# This file is ONLY for local development.
# Production uses managed services:
#   - Neon PostgreSQL (managed)
#   - Upstash Redis (managed)
#   - Cloudflare R2 (storage)
#
# Usage:
#   docker compose up -d
# ============================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: samaa-postgres
    environment:
      POSTGRES_USER: samaa
      POSTGRES_PASSWORD: samaa_dev_password
      POSTGRES_DB: samaa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samaa"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: samaa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
